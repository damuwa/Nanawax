<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanawax - Boutique</title>
    <link rel="stylesheet" href="../Css/produit.css">
    <!-- Police moderne outfit -->
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <!--La barre de navigation-->
    <header class="navbar">
        <!-- Zone Gauche -->
        <div class="nav-section left">
            <a href="../index.html" class="menu-link">Acceuil</a>
        </div>
        
        <!-- Zone Centre (Le Logo) -->
        <div class="nav-section center">
            <a href="../index.html" class="logo-link">
                <h1 class="logo">Nanawax</h1>
            </a>
        </div>
        
        <!-- Zone Droite -->
        <div class="nav-section right">
            <a href="../boutiques.html" class="cart-link">Nos boutiques</a>
        </div>
    </header>

    <!--Détails du produit-->
    <main class="page-container">
        <section class="product-layout">
            
            <!-- Côté Gauche : Visuel -->
            <div class="product-visual">
                <img src="../Photos/Nanawax modele.jpg" alt="Mannequin Nanawax">
            </div>

            <!-- Côté Droit : Informations -->
            <div class="product-info">
                <h2 class="product-title">Ensemble MARZOUK</h2>
                <p class="product-price">90.000 Fr - 137 Euro</p>

                <!-- Description (Affichée sur Web, peut être masquée sur mobile) -->
                <p class="product-description">
                    Disponible en Aquarelle nude, bleu, vet, marron, rose, violet et en Plume Orange.
                </p>

                <!-- Sélection de la taille -->
                <div class="selection-box">
                    <div class="selection-header">
                        <span>Les tailles disponibles:</span>
                    </div>
                    <div class="size-options">
                        <div class="size-item">S</div>
                        <div class="size-item">M</div>
                        <div class="size-item">L</div>
                        <div class="size-item">XL</div>
                        <div class="size-item">2XL</div>
                        <div class="size-item">3XL</div>
                    </div>
                </div>

                <!-- Bouton d'achat -->
                <button class="btn-main">Payer avec Paypal</button>

                <!-- Menus supplémentaires (Desktop) 
                <div class="extra-details desktop-only">
                    <div class="detail-row">Description du produit <span>›</span></div>
                    <div class="detail-row">Les spécifications du produit <span>›</span></div>
                </div> -->
            </div>

        </section>
    </main>

</body>
</html>
